<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pinterest OAuth Callback Service</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(680px, calc(100vw - 32px));
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.6;
        color: #475569;
      }
      code {
        background: #f1f5f9;
        border-radius: 8px;
        padding: 2px 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pinterest OAuth Callback Service</h1>
      <p>This Vercel app hosts the production callback endpoint used by the Wix Pinterest Hub integration.</p>
      <p>Health check: <code>/api/health</code></p>
      <p>Callback endpoint: <code>/api/pinterest/callback</code></p>
    </main>
  </body>
</html>
